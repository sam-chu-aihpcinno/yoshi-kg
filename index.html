<script>
(function () {
  var P = JSON.parse(document.getElementById('payload').textContent);
  var REMEMBER_KEY = 'yoshi-kg-pw';
  var form = document.getElementById('gate');
  var pw = document.getElementById('pw');
  var go = document.getElementById('go');
  var err = document.getElementById('err');
  var remember = document.getElementById('remember');

  function b64ToBytes(b64) {
    var bin = atob(b64); var u8 = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    return u8;
  }

  async function decrypt(password) {
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey('raw', enc.encode(password),
      { name: 'PBKDF2' }, false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64ToBytes(P.salt), iterations: P.iter, hash: 'SHA-256' },
      baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    var buf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(P.iv) },
      key, b64ToBytes(P.ct));
    return new TextDecoder().decode(buf);
  }

  async function attempt(password, fromStore) {
    err.textContent = ''; go.disabled = true; go.textContent = '解鎖中…';
    try {
      var htmlText = await decrypt(password);
      if (remember.checked || fromStore) {
        try { localStorage.setItem(REMEMBER_KEY, password); } catch (e) {}
      }
      document.open(); document.write(htmlText); document.close();
    } catch (e) {
      go.disabled = false; go.textContent = '解鎖 Unlock';
      err.textContent = '密碼錯誤，請再試一次 / Wrong password';
      try { localStorage.removeItem(REMEMBER_KEY); } catch (e2) {}
      pw.select();
    }
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (pw.value) attempt(pw.value, false);
  });

  try {
    var saved = localStorage.getItem(REMEMBER_KEY);
    if (saved) { remember.checked = true; attempt(saved, true); }
  } catch (e) {}
})();
</script>
